<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha | Moura Leite Gamificação</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="brand-side">
            <div class="brand-overlay"></div>
            <div class="brand-content">
                <div class="logo-large">
                    <span class="m-letter">M</span><span class="l-letter">L</span>
                </div>
                <h1>Moura Leite</h1>
                <p>Botucatu - SP</p>
                <div class="brand-quote">
                    <blockquote>"Transformando espaços em lares há mais de 30 anos."</blockquote>
                </div>
            </div>
        </div>

        <div class="form-side">
            <div class="form-wrapper">
                <div class="form-header">
                    <h2>Recuperar senha</h2>
                    <p>Digite seu e-mail para receber sua senha cadastrada.</p>
                </div>
                <form class="auth-form" id="forgot-form">
                    <div class="form-group">
                        <label for="forgot-email">E-mail</label>
                        <input type="email" id="forgot-email" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="forgot-cpf">CPF</label>
                        <input type="text" id="forgot-cpf" placeholder="000.000.000-00" required>
                    </div>
                    <button type="submit" class="btn-auth">Enviar e-mail</button>
                </form>
                <p class="toggle-text"><a href="login.html">Voltar ao login</a></p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('forgot-form');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const email = document.getElementById('forgot-email').value.trim();
                const submitBtn = form.querySelector('button[type="submit"]');

                if (!email) {
                    alert('Por favor, informe o e-mail cadastrado.');
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = 'Verificando...';

                try {
                    const userRef = db.collection('users').doc(email);
                    const userSnap = await userRef.get();
                    let userData = null;

                    if (userSnap.exists) {
                        userData = userSnap.data();
                    } else if (email === 'admin@mouraleite.com.br') {
                        userData = { username: 'ADMIN', password: 'admin' };
                    } else if (email === 'alex.landuci@mouraleite.com.br') {
                        userData = { username: 'Alexsanderson Landuci', password: 'alex' };
                    }

                    if (!userData) {
                        alert('E-mail não encontrado. Verifique o endereço e tente novamente.');
                        return;
                    }

                    const cpfInput = document.getElementById('forgot-cpf').value.trim();
                    if (!cpfInput) {
                        alert('Por favor, informe seu CPF.');
                        return;
                    }

                    const storedCpf = userData.cpf;
                    if (storedCpf && cpfInput !== storedCpf) {
                        alert('CPF não confere com o cadastrado. Tente novamente.');
                        return;
                    }

                    const password = userData.password || '123456';
                    alert(`Senha recuperada:\n\nE-mail: ${email}\nSenha: ${password}`);
                } catch (error) {
                    console.error('Erro ao recuperar senha:', error);
                    alert('Erro ao buscar o e-mail. Tente novamente mais tarde.');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Enviar e-mail';
                }
            });
        });
    </script>
</body>
</html>
