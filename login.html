<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Moura Leite Gamificação</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">
    <div class="login-container">
        <!-- Brand Side -->
        <div class="brand-side">
            <div class="brand-overlay"></div>
            <div class="brand-content">
                <div class="logo-large">
                    <span class="m-letter">M</span><span class="l-letter">L</span>
                </div>
                <h1>Moura Leite</h1>
                <p>Botucatu - SP</p>
                <div class="brand-quote">
                    <blockquote>"Transformando espaços em lares há mais de 30 anos."</blockquote>
                </div>
            </div>
        </div>

        <!-- Form Side -->
        <div class="form-side">
            <div class="form-wrapper">
                <div id="login-form-container">
                    <div class="form-header">
                        <h2>Bem-vindo de volta!</h2>
                        <p>Entre na sua conta para continuar.</p>
                    </div>
                    <form class="auth-form" id="login-form">
                        <div class="form-group">
                            <label for="login-email">E-mail</label>
                            <input type="email" id="login-email" placeholder="seu@email.com" required>
                        </div>
                        <div class="form-group">
                            <label for="login-pass">Senha</label>
                            <input type="password" id="login-pass" placeholder="••••••••" required>
                        </div>
                        <div class="form-options">
                            <label class="remember-me">
                                <input type="checkbox"> Lembrar de mim
                            </label>
                            <a href="forgot-password.html" class="forgot-pass">Esqueci a senha</a>
                        </div>
                        <button type="submit" class="btn-auth">Entrar</button>
                        <div class="auth-divider">
                            <span>ou</span>
                        </div>
                        <button type="button" class="btn-auth btn-outlook" id="outlook-login-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 21 21">
                                <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
                                <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
                                <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
                                <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
                            </svg>
                            Entrar com Microsoft
                        </button>
                    </form>
                    <p class="toggle-text">Não tem uma conta? <a href="#" id="to-signup">Cadastre-se</a></p>
                </div>

                <div id="signup-form-container" class="hidden">
                    <div class="form-header">
                        <h2>Criar Conta</h2>
                        <p>Junte-se à nossa equipe e comece a ganhar!</p>
                    </div>
                    <form class="auth-form" id="signup-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="reg-user">Nome Completo</label>
                                <input type="text" id="reg-user" placeholder="Nome Completo" required>
                            </div>
                            <div class="form-group">
                                <label for="reg-email">E-mail</label>
                                <input type="email" id="reg-email" placeholder="seu@email.com" required>
                            </div>
                        </div>

                        <div class="form-group" style="width: 100%;">
                            <label for="reg-cpf">CPF</label>
                            <input type="text" id="reg-cpf" placeholder="000.000.000-00" required>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="reg-dept">Departamento</label>
                                <select id="reg-dept" required>
                                    <option value="" disabled selected>Selecione</option>
                                    <option value="obras">Obras</option>
                                    <option value="pessoas">Pessoas</option>
                                    <option value="relacionamento">Relacionamento</option>
                                    <option value="servicos">Serviços</option>
                                    <option value="marketing">Marketing</option>
                                    <option value="secretaria-vendas">Secretaria de Vendas</option>
                                    <option value="projetos">Projetos</option>
                                    <option value="pdv-tatui">PDV Tatuí</option>
                                    <option value="controladoria">Controladoria</option>
                                    <option value="tesouraria">Tesouraria</option>
                                    <option value="suprimentos">Suprimentos</option>
                                    <option value="comercial">Comercial</option>
                                    <option value="cobranca">Cobrança</option>
                                    <option value="pdv-avare">PDV Avaré</option>
                                    <option value="sdr">SDR</option>
                                    <option value="engenharia">Engenharia</option>
                                    <option value="novos-negocios">Novos Negócios</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="reg-dir">Diretoria</label>
                                <select id="reg-dir" required>
                                    <option value="" disabled selected>Selecione</option>
                                    <option value="engenharia">Engenharia</option>
                                    <option value="financeira">Financeira</option>
                                    <option value="comercial">Comercial</option>
                                    <option value="projetos">Projetos</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="reg-birth">Data de Nascimento</label>
                                <input type="date" id="reg-birth" required>
                            </div>
                            <div class="form-group">
                                <label for="reg-adm">Data de Admissão</label>
                                <input type="date" id="reg-adm" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="reg-pass">Senha</label>
                            <input type="password" id="reg-pass" placeholder="Mínimo 8 caracteres" required>
                        </div>

                        <button type="submit" class="btn-auth">Cadastrar</button>
                    </form>
                    <p class="toggle-text">Já tem uma conta? <a href="#" id="to-login">Faça Login</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginContainer = document.getElementById('login-form-container');
            const signupContainer = document.getElementById('signup-form-container');
            const toSignup = document.getElementById('to-signup');
            const toLogin = document.getElementById('to-login');

            toSignup.addEventListener('click', (e) => {
                e.preventDefault();
                loginContainer.classList.add('hidden');
                signupContainer.classList.remove('hidden');
                signupContainer.classList.add('content-fade');
            });

            toLogin.addEventListener('click', (e) => {
                e.preventDefault();
                signupContainer.classList.add('hidden');
                loginContainer.classList.remove('hidden');
                loginContainer.classList.add('content-fade');
            });

            // Helper to find or create user in Firestore
            const getOrCreateUser = async (email, username, defaultPoints) => {
                const userRef = db.collection("users").doc(email);
                const userSnap = await userRef.get();
                
                if (userSnap.exists) {
                    return userSnap.data();
                } else {
                    const newUser = {
                        username: username,
                        email: email,
                        points: defaultPoints,
                        dept: 'Tecnologia',
                        rank: defaultPoints > 0 ? 'Consultor Ouro' : 'Iniciante',
                        password: email === 'admin@mouraleite.com.br' ? 'admin' : (email === 'alex.landuci@mouraleite.com.br' ? 'alex' : '123456')
                    };
                    await userRef.set(newUser);
                    return newUser;
                }
            };

            // Auth Logic (Firebase)
            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('login-email').value;
                const pass = document.getElementById('login-pass').value;
                const submitBtn = e.target.querySelector('button[type="submit"]');
                
                submitBtn.disabled = true;
                submitBtn.textContent = 'Autenticando...';

                try {
                    // Check for Admin Default
                    if (email === 'admin@mouraleite.com.br') {
                        const adminInDb = await getOrCreateUser(email, 'ADMIN', 1500);
                        if (adminInDb.password === pass || (!adminInDb.password && pass === 'admin')) {
                            localStorage.setItem('moura_leite_user', JSON.stringify(adminInDb));
                            window.location.href = 'index.html';
                            return;
                        }
                    }

                    // Check for Alex Default
                    if (email === 'alex.landuci@mouraleite.com.br') {
                        const alexInDb = await getOrCreateUser(email, 'Alexsanderson Landuci', 0);
                        if (alexInDb.password === pass || (!alexInDb.password && pass === 'alex')) {
                            alexInDb.username = 'Alexsanderson Landuci';
                            alexInDb.dept = 'RH';
                            alexInDb.diretoria = 'Financeira';
                            await db.collection("users").doc(email).set(alexInDb, { merge: true });
                            localStorage.setItem('moura_leite_user', JSON.stringify(alexInDb));
                            window.location.href = 'index.html';
                            return;
                        }
                    }

                    // Normal login check
                    const userRef = db.collection("users").doc(email);
                    const userSnap = await userRef.get();

                    if (userSnap.exists) {
                        const user = userSnap.data();
                        if (user.password === pass || (!user.password && pass === '123456')) { 
                            localStorage.setItem('moura_leite_user', JSON.stringify(user));
                            window.location.href = 'index.html';
                            return;
                        }
                    }
                    
                    alert('E-mail ou senha incorretos.');
                } catch (error) {
                    console.error("Erro no login:", error);
                    alert("Erro ao conectar ao servidor. Verifique sua internet.");
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Entrar';
                }
            });

            // Outlook Login
            const outlookBtn = document.getElementById('outlook-login-btn');
            if (outlookBtn) {
                outlookBtn.addEventListener('click', async () => {
                    outlookBtn.disabled = true;
                    outlookBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Conectando...';

                    try {
                        const provider = new firebase.auth.OAuthProvider('microsoft.com');
                        provider.setCustomParameters({
                            // ID do Diretório (locatário) da Moura Leite
                            tenant: '34bf99e3-12de-4814-ab19-0d0f90fab15b'
                        });
                        
                        const result = await firebase.auth().signInWithPopup(provider);
                        const user = result.user;
                        const email = user.email;
                        
                        // Segurança extra: garantir que o e-mail seja da Moura Leite
                        if (email && !email.endsWith('@mouraleite.com.br')) {
                            alert('Acesso negado: Por favor, utilize seu e-mail corporativo da Moura Leite (@mouraleite.com.br).');
                            await firebase.auth().signOut();
                            outlookBtn.disabled = false;
                            outlookBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg> Entrar com Microsoft';
                            return;
                        }

                        const username = user.displayName || 'Usuário Outlook';

                        const userRef = db.collection("users").doc(email);
                        const userSnap = await userRef.get();

                        if (userSnap.exists) {
                            // User exists, login
                            const userData = userSnap.data();
                            localStorage.setItem('moura_leite_user', JSON.stringify(userData));
                            window.location.href = 'index.html';
                        } else {
                            // First access via Outlook, ask for CPF
                            let cpf = null;
                            while (!cpf) {
                                cpf = prompt('Para concluir seu primeiro acesso, informe seu CPF (ex: 000.000.000-00):');
                                if (cpf === null) {
                                    alert('Cadastro cancelado. O CPF é obrigatório para o primeiro acesso.');
                                    outlookBtn.disabled = false;
                                    outlookBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg> Entrar com Microsoft';
                                    // Sign out to clean up the cancelled auth state
                                    await firebase.auth().signOut();
                                    return;
                                }
                                cpf = cpf.trim();
                            }

                            // Create new user profile
                            const randomPassword = Math.floor(10000 + Math.random() * 90000).toString();
                            const newUser = {
                                username: username,
                                email: email,
                                cpf: cpf,
                                dept: 'Não informado',
                                diretoria: 'Não informada',
                                birth: '',
                                admission: '',
                                password: randomPassword,
                                points: 0,
                                rank: 'Iniciante',
                                history: [],
                                notifications: []
                            };

                            await userRef.set(newUser);
                            localStorage.setItem('moura_leite_user', JSON.stringify(newUser));
                            alert('Conta criada com sucesso via Microsoft!');
                            window.location.href = 'index.html';
                        }

                    } catch (error) {
                        console.error('Erro no login com Outlook:', error);
                        alert('Erro ao fazer login com a Microsoft. Verifique com o administrador se a opção está ativada no painel do Firebase.');
                    } finally {
                        outlookBtn.disabled = false;
                        outlookBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg> Entrar com Microsoft';
                    }
                });
            }

            document.getElementById('signup-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('reg-user').value;
                const email = document.getElementById('reg-email').value;
                const dept = document.getElementById('reg-dept').value;
                const diretoria = document.getElementById('reg-dir').value;
                const cpf = document.getElementById('reg-cpf').value;
                const password = document.getElementById('reg-pass').value;
                const submitBtn = e.target.querySelector('button[type="submit"]');

                submitBtn.disabled = true;
                submitBtn.textContent = 'Criando conta...';

                try {
                    const userRef = db.collection("users").doc(email);
                    const userSnap = await userRef.get();

                    if (userSnap.exists) {
                        alert('Este e-mail já está cadastrado. Faça login.');
                        return;
                    }

                    const birth = document.getElementById('reg-birth').value;
                    const admission = document.getElementById('reg-adm').value;

                    const newUser = {
                        username,
                        email,
                        dept,
                        diretoria,
                        cpf,
                        birth,
                        admission,
                        password,
                        points: 0,
                        rank: 'Iniciante',
                        history: [],
                        notifications: []
                    };

                    await userRef.set(newUser);
                    localStorage.setItem('moura_leite_user', JSON.stringify(newUser));
                    
                    alert('Conta criada com sucesso!');
                    window.location.href = 'index.html';
                } catch (error) {
                    console.error("Erro no cadastro:", error);
                    alert("Erro ao criar conta no servidor.");
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Cadastrar';
                }
            });
        });
    </script>
</body>
</html>
